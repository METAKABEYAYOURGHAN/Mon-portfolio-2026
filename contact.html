<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Yourghan Portfolio</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/contact.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo"><a href="index.html">Mon Portfolio</a></div>
        <nav>
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="projet.html">Projet</a></li>
                <li><a href="passion.html">Passions</a></li>
                <li><a href="divertissement.html">Divertissement</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="contact-main">
        <div class="contact-container container">
            <section class="contact-info animated-fadeInDown">
                <h1>Contactez-moi</h1>
                <div class="separator"></div>
                <p>Je suis basé à <strong>Lubumbashi</strong>. N'hésitez pas à me joindre pour toute collaboration ou opportunité.</p>
                
                <div class="contact-methods">
                    <div class="method-item">
                        <i class="fa-solid fa-phone"></i>
                        <span>+243 979 628 877</span>
                    </div>
                    <div class="social-apps">
                        <a href="https://wa.me/243979628877" target="_blank" class="whatsapp">
                            <i class="fa-brands fa-whatsapp"></i> WhatsApp
                        </a>
                        <a href="https://t.me/+243979628877" target="_blank" class="telegram">
                            <i class="fa-brands fa-telegram"></i> Telegram
                        </a>
                    </div>
                </div>
            </section>

            <section class="contact-form-section animated-fadeInUp">
                <form action="#" class="contact-form">
                    <div class="form-group">
                        <label for="name">Nom complet</label>
                        <input type="text" id="name" name="name" placeholder="Votre nom" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Téléphone</label>
                        <input type="tel" id="phone" name="phone" placeholder="+243..." required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" placeholder="Votre message..." required></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Envoyer le message <i class="fa-solid fa-paper-plane"></i></button>
                </form>
            </section>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Yourghan. Tous droits réservés.</p>
        <div class="social-links">
            <a href="#"><i class="fa-brands fa-github"></i></a>
            <a href="#"><i class="fa-brands fa-linkedin"></i></a>
            <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
        </div>
    </footer>
</body>
</html>
